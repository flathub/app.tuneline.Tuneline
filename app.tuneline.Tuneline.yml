app-id: app.tuneline.Tuneline
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: tuneline

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  # connectivity_plus probes NetworkManager over the D-Bus *system* bus. Without
  # a grant the sandbox has no /var/run/dbus/system_bus_socket, so the probe
  # throws SocketException (errno=2) into the root zone — this was the single
  # largest source of app fatals (`error.zone.uncaught`) on Linux. Scope the
  # grant to NetworkManager only (Flathub-preferred over a blanket --socket=
  # system-bus). main.dart's zone handler is the belt-and-suspenders fallback
  # for sandboxes where the bus is still unreachable (e.g. Snap AppArmor).
  - --system-talk-name=org.freedesktop.NetworkManager
  # flutter_secure_storage reads/writes the device token via the Secret Service
  # (org.freedesktop.secrets) on the *session* bus. Without this grant the read
  # throws in the sandbox and the app fell back to an empty store and minted a
  # NEW device token each time — registering a phantom device that tripped the
  # device-limit cap against the user's own machine. The token_storage_service
  # prefs-canonical fix makes churn impossible regardless; this grant restores
  # the keyring so the secure mirror actually lands when a keyring is present.
  - --talk-name=org.freedesktop.secrets

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/bash-completion
  - /share/doc
  - /share/man
  - /share/zsh
  - "*.la"
  - "*.a"

modules:
  - name: libass
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.xz
        sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a
        x-checker-data:
          type: anitya
          project-id: 1560
          stable-only: true
          url-template: https://github.com/libass/libass/releases/download/$version/libass-$version.tar.xz

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Ddemos=false  # skips plplay and its Nuklear submodule
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: libmpv
    cleanup:
      - /share/applications
      - /share/icons
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dbuild-date=false
      - -Dalsa=disabled
      - -Dlua=disabled
      - -Dcplayer=false
      - -Dmanpage-build=disabled
      - -Dhtml-build=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209
        x-checker-data:
          type: anitya
          project-id: 5348
          stable-only: true
          url-template: https://github.com/mpv-player/mpv/archive/v$version.tar.gz

  - name: tuneline
    buildsystem: simple
    build-commands:
      - mkdir -p /app/tuneline
      - cp -ra lib /app/tuneline/lib
      - cp -r data /app/tuneline/data
      - install -Dm755 tuneline /app/tuneline/tuneline
      - mkdir -p /app/bin
      - ln -s /app/tuneline/tuneline /app/bin/tuneline
      - install -Dm644 share/applications/app.tuneline.Tuneline.desktop /app/share/applications/app.tuneline.Tuneline.desktop
      - install -Dm644 share/metainfo/app.tuneline.Tuneline.metainfo.xml /app/share/metainfo/app.tuneline.Tuneline.metainfo.xml
      - install -Dm644 share/icons/hicolor/512x512/apps/app.tuneline.Tuneline.png /app/share/icons/hicolor/512x512/apps/app.tuneline.Tuneline.png
    sources:
      - type: archive
        url: https://tuneline.app/downloads/tuneline-1.0.92-linux-x86_64.tar.gz
        sha256: 36b984de1d2958b9200263ec19a7411333bbbe82eed0b54a56cf5042fa406b28
        x-checker-data:
          type: anitya
          project-id: 389740
          stable-only: true
          url-template: https://tuneline.app/downloads/tuneline-$version-linux-x86_64.tar.gz
